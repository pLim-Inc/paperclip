services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET}"
    volumes:
      - paperclip-data:/paperclip
      - /opt/liftgrid:/opt/liftgrid:ro
      - /opt/cplimission:/opt/cplimission:ro
      - /opt/aifsacct:/opt/aifsacct:ro
      - /root/.claude:/paperclip/.claude:rw
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - liftgrid-backend

volumes:
  pgdata:
  paperclip-data:

networks:
  liftgrid-backend:
    external: true
